<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackhole Web</title>
    <link rel="icon" type="image/png" href="./hole_favicon.png">
    <link rel="apple-touch-icon" href="./hole_favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            color-scheme: dark;
        }
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            color: #e5e7eb;
            font-family: "Inter", "Segoe UI", sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #boot-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            transition: opacity 220ms ease;
        }
        #boot-overlay.is-hidden {
            opacity: 0;
            pointer-events: none;
        }
        .boot-shell {
            width: min(320px, 86vw);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            text-align: center;
        }
        .boot-track {
            width: 100%;
            height: 2px;
            background: #333;
            border-radius: 999px;
            overflow: hidden;
        }
        .boot-fill {
            width: 45%;
            height: 100%;
            background: #e0f2fe;
            box-shadow: 0 0 10px rgba(224, 242, 254, 0.5), 0 0 20px rgba(224, 242, 254, 0.3);
            animation: loading-progress 1.9s ease-in-out infinite;
        }
        @keyframes loading-progress {
            0% {
                transform: translateX(-120%);
            }
            50% {
                transform: translateX(65%);
            }
            100% {
                transform: translateX(220%);
            }
        }
        #boot-phase {
            font-family: "Space Grotesk", monospace;
            font-size: 10px;
            letter-spacing: 0.2em;
            color: #737373;
            text-transform: uppercase;
        }
        #boot-title {
            margin: 2px 0 0;
            font-family: "Space Grotesk", monospace;
            font-size: 18px;
            line-height: 1.35;
            color: #f3f4f6;
        }
        #boot-message {
            margin: 0;
            max-width: 34ch;
            font-size: 13px;
            line-height: 1.45;
            color: #a3a3a3;
        }
        #boot-action {
            border: 1px solid #525252;
            background: transparent;
            color: #f5f5f5;
            border-radius: 8px;
            padding: 7px 12px;
            font-size: 13px;
            cursor: pointer;
        }
        #boot-action:hover {
            border-color: #8a8a8a;
        }
        .hidden {
            display: none;
        }
        @media (max-width: 480px) {
            .boot-shell {
                width: min(320px, 92vw);
                gap: 10px;
            }
            #boot-title {
                font-size: 16px;
            }
            #boot-message {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div id="boot-overlay" role="status" aria-live="polite">
        <div class="boot-shell">
            <div id="boot-bar" class="boot-track">
                <div class="boot-fill"></div>
            </div>
            <span id="boot-phase">Compiling Resources</span>
            <h1 id="boot-title" class="hidden"></h1>
            <p id="boot-message" class="hidden"></p>
            <button id="boot-action" type="button" class="hidden">Retry</button>
        </div>
    </div>
    <script type="module">
        import init from './pkg/blackhole_web.js';

        const overlay = document.getElementById('boot-overlay');
        const bar = document.getElementById('boot-bar');
        const phase = document.getElementById('boot-phase');
        const title = document.getElementById('boot-title');
        const message = document.getElementById('boot-message');
        const action = document.getElementById('boot-action');

        function classifyDevice() {
            const uaDataMobile = navigator.userAgentData && navigator.userAgentData.mobile === true;
            const ua = navigator.userAgent || '';
            const uaMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobile/i.test(ua);
            const coarse = window.matchMedia('(pointer: coarse)').matches;
            const noHover = window.matchMedia('(hover: none)').matches;
            const hasTouch = (navigator.maxTouchPoints || 0) > 1;
            return uaDataMobile || uaMobile || (coarse && noHover && hasTouch);
        }

        function supportsWebGl2() {
            const canvas = document.createElement('canvas');
            return !!canvas.getContext('webgl2');
        }

        function showLoading() {
            bar.classList.remove('hidden');
            phase.textContent = 'Compiling Resources';
            title.classList.add('hidden');
            message.classList.add('hidden');
            action.classList.add('hidden');
            action.onclick = null;
        }

        function showMessage(phaseText, titleText, messageText, options = {}) {
            const { actionLabel = '', onAction = null, keepBar = false } = options;
            bar.classList.toggle('hidden', !keepBar);
            phase.textContent = phaseText;
            title.textContent = titleText;
            message.textContent = messageText;
            title.classList.remove('hidden');
            message.classList.remove('hidden');
            if (actionLabel && onAction) {
                action.textContent = actionLabel;
                action.onclick = onAction;
                action.classList.remove('hidden');
            } else {
                action.classList.add('hidden');
                action.onclick = null;
            }
        }

        function hideOverlay() {
            overlay.classList.add('is-hidden');
            window.setTimeout(() => {
                overlay.style.display = 'none';
            }, 220);
        }

        async function startSimulation() {
            if (classifyDevice()) {
                showMessage(
                    'Desktop Only',
                    'Simulation Runs On Desktop',
                    'Mobile and tablet browsers are currently unsupported. Please open this on a desktop browser with hardware acceleration enabled.'
                );
                return;
            }

            if (!supportsWebGl2()) {
                showMessage(
                    'Unsupported Browser',
                    'WebGL2 Is Required',
                    'This browser or GPU cannot start the simulation. Try desktop Chrome, Edge, or Firefox with hardware acceleration turned on.'
                );
                return;
            }

            showLoading();
            try {
                await init();
                hideOverlay();
            } catch (error) {
                console.error(error);
                showMessage(
                    'Launch Failed',
                    'Could Not Start Simulation',
                    error && error.message ? error.message : 'Unknown startup error.',
                    {
                        actionLabel: 'Retry',
                        onAction: () => window.location.reload()
                    }
                );
            }
        }

        startSimulation();
    </script>
</body>
</html>
